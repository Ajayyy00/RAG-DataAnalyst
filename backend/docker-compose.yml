version: "3.9"

services:

  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: hc_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-healthcopilot}
      POSTGRES_USER: ${POSTGRES_USER:-hc_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hc_user} -d ${POSTGRES_DB:-healthcopilot}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hc_redis
    command: >-
      redis-server
      --requirepass ${REDIS_PASSWORD:-changeme}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── ChromaDB ───────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: hc_chromadb
    volumes:
      - chroma_data:/chroma/.chroma
    ports:
      - "8000:8000"
    environment:
      CHROMA_SERVER_AUTH_CREDENTIALS_PROVIDER: "chromadb.auth.token.TokenConfigServerAuthCredentialsProvider"
      ANONYMIZED_TELEMETRY: "False"
    restart: unless-stopped

  # ── Backend API ────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hc_backend
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      CHROMADB_HOST: chromadb
      CHROMADB_PORT: 8000
      NEO4J_URI: bolt://neo4j:7687
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
    volumes:
      - ./app:/app/app:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload
    restart: unless-stopped

  # ── Prometheus ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: hc_prometheus
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: unless-stopped

  # ── Grafana ────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: hc_grafana
    ports:
      - "3000:3000"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
      - jaeger
    restart: unless-stopped

  # ── Jaeger ─────────────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: hc_jaeger
    ports:
      - "16686:16686" # UI
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    restart: unless-stopped

  # ── Neo4j Knowledge Graph ──────────────────────────────────
  neo4j:
    image: neo4j:5.19-community
    container_name: hc_neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-changeme}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    ports:
      - "7474:7474"   # Browser HTTP
      - "7687:7687"   # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
  chroma_data:
  neo4j_data:
  neo4j_logs:
