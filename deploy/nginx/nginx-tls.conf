# Self-managed TLS edge (VM deployments without a cloud load balancer).
# Replace frontend/nginx.conf with this (or mount it) and mount certs at
# /etc/nginx/certs/. Obtain certs via certbot/Let's Encrypt or your CA.
#
#   docker compose -f docker-compose.prod.yml run certbot ...   (see docs)
#   volumes:
#     - ./deploy/nginx/nginx-tls.conf:/etc/nginx/conf.d/default.conf:ro
#     - /etc/letsencrypt/live/DOMAIN/fullchain.pem:/etc/nginx/certs/fullchain.pem:ro
#     - /etc/letsencrypt/live/DOMAIN/privkey.pem:/etc/nginx/certs/privkey.pem:ro

upstream backend_api {
    server backend:8001;
    keepalive 32;
}

# HTTP → HTTPS redirect (keep ACME challenge path open for certbot renewals).
server {
    listen 80;
    server_name _;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    root /usr/share/nginx/html;
    index index.html;
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    location = /healthz { access_log off; return 200 "ok\n"; add_header Content-Type text/plain; }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /api/ {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    location /ws/ {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 3600s;
    }

    location / { try_files $uri $uri/ /index.html; }

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
}
