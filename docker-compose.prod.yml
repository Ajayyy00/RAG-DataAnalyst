# ============================================================================
#  Production composition for the Healthcare Copilot.
#
#  Differences from backend/docker-compose.yml (dev):
#    * No source bind-mounts, no --reload.
#    * Datastores are NOT published to the host (internal network only).
#    * DB migrations run as a one-shot `migrate` service before the API starts.
#    * The frontend nginx is the single edge (serves the SPA + proxies /api,/ws).
#    * Resource limits + secrets from .env (strong values required).
#    * Monitoring bound to localhost only.
#
#  Usage:
#    cp backend/.env.example .env   # fill STRONG secrets + READONLY_* + PHI keys
#    docker compose -f docker-compose.prod.yml up -d --build
#  TLS: terminate at a cloud LB in front of `frontend`, OR mount certs and use
#  deploy/nginx/nginx-tls.conf (see docs/DEPLOYMENT.md).
# ============================================================================
x-backend-env: &backend-env
  APP_ENV: production
  APP_DEBUG: "false"
  POSTGRES_HOST: postgres
  REDIS_URL: redis://:${REDIS_PASSWORD:?set REDIS_PASSWORD}@redis:6379
  CHROMADB_HOST: chromadb
  CHROMADB_PORT: "8000"
  CHROMADB_MODE: http
  NEO4J_URI: bolt://neo4j:7687
  REQUIRE_READONLY_ROLE: "true"
  COOKIE_SECURE: "true"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-healthcopilot}
      POSTGRES_USER: ${POSTGRES_USER:-hc_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hc_user} -d ${POSTGRES_DB:-healthcopilot}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    mem_limit: 2g

  redis:
    image: redis:7-alpine
    command: >-
      redis-server --requirepass ${REDIS_PASSWORD:?set REDIS_PASSWORD}
      --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    mem_limit: 768m

  chromadb:
    image: chromadb/chroma:latest
    volumes:
      - chroma_data:/chroma/.chroma
    environment:
      ANONYMIZED_TELEMETRY: "False"
    restart: always
    mem_limit: 1g

  neo4j:
    image: neo4j:5.19-community
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:?set NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_max__size: 1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: always
    mem_limit: 2g

  # One-shot: apply migrations, then exit. Backend waits for success.
  migrate:
    build: { context: ./backend, dockerfile: Dockerfile }
    env_file: [.env]
    environment: *backend-env
    entrypoint: ["bash", "scripts/entrypoint.sh"]
    command: []     # no server cmd → migrate-only then exit 0
    depends_on:
      postgres: { condition: service_healthy }
    restart: "no"

  backend:
    build: { context: ./backend, dockerfile: Dockerfile }
    env_file: [.env]
    environment: *backend-env
    # Honour X-Forwarded-Proto from the edge so HTTPS detection / Secure cookies work.
    command: >-
      uvicorn app.main:app --host 0.0.0.0 --port 8001 --workers 4
      --proxy-headers --forwarded-allow-ips=*
    depends_on:
      migrate: { condition: service_completed_successfully }
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      chromadb: { condition: service_started }
    restart: always
    mem_limit: 4g

  frontend:
    build: { context: ./frontend, dockerfile: Dockerfile }
    depends_on: [backend]
    ports:
      - "80:80"        # add "443:443" when using deploy/nginx/nginx-tls.conf
    restart: always
    mem_limit: 256m

  # ── Monitoring (bound to localhost; reach via SSH tunnel / private LB) ─────
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./backend/infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./backend/infra/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    ports: ["127.0.0.1:9090:9090"]
    restart: always

  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?set GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./backend/infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports: ["127.0.0.1:3000:3000"]
    depends_on: [prometheus]
    restart: always

volumes:
  pg_data:
  redis_data:
  chroma_data:
  neo4j_data:
  neo4j_logs:
  grafana_data:
