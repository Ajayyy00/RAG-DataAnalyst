name: Verify Code Quality

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  secret-scan:
    name: Secret Scanning (detect-secrets)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install detect-secrets
      run: pip install detect-secrets==1.5.0
    - name: Audit working tree against baseline
      run: |
        detect-secrets scan --baseline .secrets.baseline \
          --exclude-files '\.venv/' \
          --exclude-files 'node_modules/' \
          --exclude-files 'package-lock\.json' \
          --exclude-files '\.env$'
        git diff --exit-code .secrets.baseline \
          || (echo "::error::New secrets detected — review and update .secrets.baseline" && exit 1)

  backend-lint:
    name: Backend Lint & Format Validation
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install black isort flake8 bandit pip-audit

    - name: Check code formatting (Black)
      run: black --check backend/

    - name: Check imports organization (isort)
      run: isort --check --profile black backend/

    - name: Lint code style (flake8)
      run: flake8 backend/ --max-line-length=120 --exclude=alembic,venv,.venv

    - name: Security static analysis (Bandit)
      run: bandit -r backend/app -ll --exclude backend/.venv

    - name: Dependency vulnerability audit (pip-audit)
      run: pip-audit -r backend/requirements.txt
      continue-on-error: true   # report advisories without blocking the build (yet)

  backend-tests:
    name: Backend Unit + Security Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    - name: Install dependencies
      working-directory: backend
      run: |
        python -m pip install --upgrade pip
        pip install --extra-index-url https://download.pytorch.org/whl/cpu -r requirements.txt
    - name: Run unit + security tests
      working-directory: backend
      run: pytest tests/unit tests/security -q

  backend-integration:
    name: Backend Integration (RLS + read-only isolation)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: healthcopilot
          POSTGRES_USER: hc_user
          POSTGRES_PASSWORD: changeme
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U hc_user -d healthcopilot"
          --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: '5432'
      POSTGRES_DB: healthcopilot
      POSTGRES_USER: hc_user
      POSTGRES_PASSWORD: changeme
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    - name: Install dependencies
      working-directory: backend
      run: |
        python -m pip install --upgrade pip
        pip install --extra-index-url https://download.pytorch.org/whl/cpu -r requirements.txt
    - name: Apply migrations (creates RLS policies)
      working-directory: backend
      run: alembic upgrade head
    - name: Run integration tests
      working-directory: backend
      run: pytest tests/integration -q

  frontend-lint:
    name: Frontend Lint Validation
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      working-directory: frontend
      run: npm ci

    - name: Run ESLint
      working-directory: frontend
      run: npm run lint

    - name: Dependency vulnerability audit (npm audit)
      working-directory: frontend
      run: npm audit --audit-level=high
      continue-on-error: true
