# Frontend edge: serves the built SPA and reverse-proxies the API + WebSockets.
# TLS is terminated either by a cloud load balancer (AWS ALB / Azure App Gateway)
# in front of this container, or by the self-managed TLS block in
# deploy/nginx/nginx-tls.conf. This server listens on plain HTTP:80.

upstream backend_api {
    server backend:8001;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Trust the X-Forwarded-* headers from the upstream TLS terminator.
    real_ip_header X-Forwarded-For;

    root /usr/share/nginx/html;
    index index.html;

    # gzip for text assets
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Liveness for the container healthcheck / LB.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Hashed build assets — cache hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API → backend (cookies preserved; do not buffer SSE/streaming).
    location /api/ {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_buffering off;        # critical for the SSE agentic stream
        proxy_cache off;
    }

    # WebSockets (realtime analytics + query streaming).
    location /ws/ {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    # SPA client-side routing fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Baseline static-response security headers (API sets its own).
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
}
